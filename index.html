<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Studio Code - Homepage Clone</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="shortcut icon"
      href="./assets/vscode-logo.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="vscode">
          <img src="./assets/vscode-logo.png" alt="vs-code logo" />
          <a href="#">Visual Studio Code</a>
        </div>
        <a href="#">Docs</a>
        <a href="#">Updates</a>
        <a href="#">Blog</a>
        <a href="#">API</a>
        <a href="#">Extensions</a>
        <a href="#">FAQ</a>
        <a href="#">GitHub Copilot</a>
        <div class="toggle-switch">
          <img src="./assets/light-mode.png" alt="mode-change" />
        </div>
        <input type="text" placeholder="Search Docs" />
        <button>Download</button>
      </nav>
    </header>
    <main>
      <section class="hero-section">
        <h1><span>Your code editor.</span><span>Redefined with AI.</span></h1>
        <div class="buttons">
          <button class="download">Download for Windows</button>
          <button class="try-agent-mode">Try agent mode</button>
        </div>
        <div class="small-links">
          <span><a href="#">Web,</a></span>
          <span><a href="#">Insiders edition,</a></span>
          <span>or</span>
          <span><a href="#">other platforms</a></span>
        </div>
        <div class="hover-container">
          <div class="hover-hidden">
            <p>
              By using VS Code, you agree to its <a href="#">license</a> and
              <a href="#">privacy statement.</a>
            </p>
          </div>
        </div>
        <div class="hero-background">
          <img src="./assets/hero-background.webp" alt="hero-background-image">
          <button>Reply</button>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
