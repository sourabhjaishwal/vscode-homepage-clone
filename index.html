<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Studio Code - Homepage Clone</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="shortcut icon"
      href="./assets/vscode-logo.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="vscode">
          <img src="./assets/vscode-logo.png" alt="vs-code logo" />
          <a href="#">Visual Studio Code</a>
        </div>
        <a href="#">Docs</a>
        <a href="#">Updates</a>
        <a href="#">Blog</a>
        <a href="#">API</a>
        <a href="#">Extensions</a>
        <a href="#">FAQ</a>
        <a href="#">GitHub Copilot</a>
        <div class="toggle-switch">
          <img src="./assets/light-mode.png" alt="mode-change" />
        </div>
        <input type="text" placeholder="Search Docs" />
        <button>Download</button>
      </nav>
    </header>
  </body>
</html>
